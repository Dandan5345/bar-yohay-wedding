<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>בר ויוחאי — החתונה</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;500;700&family=Playfair+Display:wght@500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #faf6f1;
      --blush: #e8c4c4;
      --rose: #c97b84;
      --ink: #3d2c2e;
      --gold: #c4a574;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Heebo", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(232, 196, 196, 0.55), transparent 55%),
        radial-gradient(ellipse 70% 50% at 85% 90%, rgba(196, 165, 116, 0.35), transparent 50%),
        linear-gradient(165deg, var(--cream) 0%, #f3e8e4 100%);
      overflow: hidden;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      width: 280px;
      height: 280px;
      border: 1px solid rgba(201, 123, 132, 0.25);
      border-radius: 50%;
      pointer-events: none;
      animation: drift 14s ease-in-out infinite;
    }

    body::before {
      top: -80px;
      left: -60px;
    }

    body::after {
      bottom: -100px;
      right: -40px;
      animation-delay: -7s;
    }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(18px, 12px) scale(1.05); }
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    main {
      text-align: center;
      padding: 2.5rem 1.5rem;
      animation: rise 1s ease-out both;
      max-width: 36rem;
    }

    .ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.85rem;
      margin-bottom: 1.75rem;
      color: var(--gold);
      font-size: 0.85rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      font-weight: 300;
    }

    .ornament::before,
    .ornament::after {
      content: "";
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    h1 {
      font-family: "Playfair Display", "Heebo", serif;
      font-size: clamp(2.6rem, 8vw, 4.2rem);
      font-weight: 500;
      line-height: 1.15;
      color: var(--ink);
      margin-bottom: 0.85rem;
    }

    h1 span {
      display: block;
      color: var(--rose);
      font-size: 0.42em;
      letter-spacing: 0.12em;
      margin-top: 0.65rem;
      font-family: "Heebo", sans-serif;
      font-weight: 300;
    }

    p {
      font-size: 1.15rem;
      font-weight: 300;
      line-height: 1.7;
      color: rgba(61, 44, 46, 0.78);
      animation: rise 1s ease-out 0.25s both;
    }

    .heart {
      display: inline-block;
      color: var(--rose);
      animation: pulse 2.4s ease-in-out infinite;
      margin-inline: 0.15em;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }
  </style>
</head>
<body>
  <main>
    <div class="ornament">Bar &amp; Yohay</div>
    <h1>
      שלום עולם
      <span>האתר של החתונה בדרך</span>
    </h1>
    <p>
      ברוכים הבאים<span class="heart">♥</span>
      עוד מעט יהיה כאן משהו יפה במיוחד.
    </p>
  </main>
</body>
</html>
